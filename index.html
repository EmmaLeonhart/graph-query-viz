<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph Query Viz - SPARQL to Graph</title>
  <meta name="description" content="Visualize Wikidata SPARQL query results as interactive force-directed graphs." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div class="app-container">

    <!-- ====== Sidebar: Query Editor ====== -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>
          <span class="logo-icon">G</span>
          Graph Query Viz
        </h1>
        <p>Explore Wikidata as interactive graphs</p>
      </div>

      <div class="controls">
        <div class="control-row">
          <select id="example-select" class="example-select">
            <option value="">Load an example query...</option>
          </select>
        </div>
      </div>

      <div class="editor-wrapper">
        <label class="editor-label" for="query-editor">SPARQL Query</label>
        <textarea
          id="query-editor"
          class="query-editor"
          spellcheck="false"
          placeholder="SELECT ?item ?itemLabel ?parent ?parentLabel WHERE {&#10;  ?item wdt:P279 ?parent .&#10;  SERVICE wikibase:label { bd:serviceParam wikibase:language &quot;en&quot;. }&#10;}&#10;LIMIT 50"
        ></textarea>
      </div>

      <div class="sidebar-actions">
        <button id="run-btn" class="btn btn-primary btn-run">
          <span class="btn-label">Run Query (Ctrl+Enter)</span>
          <span class="spinner"></span>
        </button>
      </div>
    </aside>

    <!-- ====== Main Panel: Graph Canvas ====== -->
    <main class="main-panel">
      <div class="info-bar">
        <span class="status-dot ready"></span>
        <span class="status-text">Select an example or write a SPARQL query, then press Run.</span>
        <div class="stats">
          <span id="stat-nodes">0 nodes</span>
          <span id="stat-edges">0 edges</span>
        </div>
      </div>

      <div class="graph-container" id="graph-container">
        <!-- Empty state -->
        <div class="empty-state">
          <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="6" stroke="currentColor" stroke-width="2"/>
            <circle cx="44" cy="16" r="6" stroke="currentColor" stroke-width="2"/>
            <circle cx="32" cy="44" r="6" stroke="currentColor" stroke-width="2"/>
            <line x1="25" y1="23" x2="29" y2="40" stroke="currentColor" stroke-width="1.5"/>
            <line x1="39" y1="20" x2="35" y2="40" stroke="currentColor" stroke-width="1.5"/>
            <line x1="26" y1="18" x2="38" y2="16" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <p>No graph to display</p>
          <span>Run a SPARQL query to visualize entities and relationships</span>
        </div>

        <!-- Detail panel (appears on node click) -->
        <div class="detail-panel"></div>
      </div>

      <!-- Error toast -->
      <div class="error-toast" id="error-toast"></div>
    </main>
  </div>

  <!-- D3.js v7 from CDN -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <!-- Application scripts -->
  <script src="js/sparql.js"></script>
  <script src="js/graph.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
